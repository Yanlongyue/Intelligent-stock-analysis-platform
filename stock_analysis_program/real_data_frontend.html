<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 智能股票分析系统 - 真实数据版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js?v=20260403-1"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --dark-color: #1a252f;
            --light-color: #ecf0f1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--primary-color);
            color: white;
            padding: 20px 0;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .data-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .status-real {
            background: var(--success-color);
            color: white;
        }
        
        .status-mock {
            background: var(--warning-color);
            color: white;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: var(--primary-color);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .refresh-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
        
        .stock-list {
            display: grid;
            gap: 15px;
        }
        
        .stock-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--secondary-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .stock-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .stock-code {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stock-price {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .price-up {
            color: #e74c3c; /* 红色代表涨（A股惯例） */
        }
        
        .price-down {
            color: #27ae60; /* 绿色代表跌（A股惯例） */
        }
        
        .algorithm-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        
        .algorithm-item {
            text-align: center;
            padding: 15px 5px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }
        
        .score-display {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        
        .score-name {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .analysis-section {
            margin-top: 30px;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--secondary-color);
        }
        
        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .error {
            background: var(--danger-color);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .info-box {
            background: #e8f4fc;
            border-left: 4px solid var(--secondary-color);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        
        .info-box h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .algorithm-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-chart-line"></i> 智能股票分析系统</h1>
            <p>基于真实金融数据的五维度算法评分平台</p>
            <div id="dataStatus" class="data-status status-mock">
                <i class="fas fa-database"></i> 数据模式：检测中...
            </div>
        </header>
        
        <div class="dashboard">
            <div class="card">
                <h2>
                    <span><i class="fas fa-chart-pie"></i> 市场概况</span>
                    <button class="refresh-btn" onclick="loadMarketOverview()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </h2>
                <div id="marketOverview" class="loading">
                    <i class="fas fa-spinner fa-spin"></i><br>
                    加载市场数据...
                </div>
            </div>
            
            <div class="card">
                <h2>
                    <span><i class="fas fa-wallet"></i> 我的持仓</span>
                    <button class="refresh-btn" onclick="loadPositions()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </h2>
                <div id="positionsList" class="loading">
                    <i class="fas fa-spinner fa-spin"></i><br>
                    加载持仓数据...
                </div>
            </div>
        </div>
        
        <div class="card analysis-section">
            <h2>
                <span><i class="fas fa-brain"></i> 五维度算法分析</span>
                <button class="refresh-btn" onclick="analyzeAllStocks()">
                    <i class="fas fa-play"></i> 执行分析
                </button>
            </h2>
            
            <div class="info-box">
                <h3><i class="fas fa-info-circle"></i> 数据源说明</h3>
                <p>本系统支持两种数据模式：</p>
                <ul>
                    <li><strong>真实数据模式</strong>：使用Tushare Pro API获取实时金融数据（需要API Token）</li>
                    <li><strong>模拟数据模式</strong>：当真实数据不可用时自动切换至模拟数据</li>
                </ul>
                <p>要使用真实数据，请设置环境变量 <code>TUSHARE_TOKEN</code>，不要再把 Token 写进代码文件。</p>
            </div>
            
            <div id="algorithmAnalysis">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i><br>
                    等待分析指令...
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2><i class="fas fa-server"></i> 系统状态</h2>
            <div id="systemStatus">
                <p><i class="fas fa-circle-notch fa-spin"></i> 检测系统状态...</p>
            </div>
        </div>
    </div>
    
    <script>
        // API配置
        const API_RUNTIME = window.getApiConfigStatus ? window.getApiConfigStatus() : (() => {
            const hostname = window.location.hostname;
            const isLocalHost = hostname === 'localhost' || hostname === '127.0.0.1';

            return {
                apiBaseUrl: isLocalHost ? 'http://localhost:9000' : '',
                isConfigured: isLocalHost,
                mode: isLocalHost ? 'development' : 'production',
                version: 'fallback'
            };
        })();
        const API_BASE_URL = API_RUNTIME.apiBaseUrl;

        function getApiHelpText() {
            if (API_BASE_URL) {
                return `请确保后端服务正在运行 (${API_BASE_URL})`;
            }

            if (API_RUNTIME.mode === 'production') {
                return '当前公网 API 地址尚未配置，请先在 config.js 中填写 production，或通过 ?api=https://您的后端地址 临时指定。';
            }

            return '当前本地 API 地址未配置，请检查 config.js 中的 development 设置。';
        }

        async function fetchApi(path) {
            if (!API_BASE_URL) {
                throw new Error(API_RUNTIME.mode === 'production' ? '当前页面尚未配置公网 API 地址' : '当前页面尚未配置本地 API 地址');
            }

            return fetch(`${API_BASE_URL}${path}`);
        }
        
        // 加载持仓数据
        async function loadPositions() {
            const container = document.getElementById('positionsList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>加载持仓数据...</div>';
            
            try {
                const response = await fetchApi('/api/positions');
                if (!response.ok) throw new Error('网络请求失败');
                
                const data = await response.json();
                
                let html = '<div class="stock-list">';
                data.positions.forEach(position => {
                    const isUp = position.current_price >= position.cost_price;
                    const changeColor = isUp ? 'price-up' : 'price-down';
                    const changeIcon = isUp ? 'fa-arrow-up' : 'fa-arrow-down';
                    
                    html += `
                        <div class="stock-item" onclick="analyzeStock('${position.code}')">
                            <div class="stock-header">
                                <div>
                                    <span class="stock-code">${position.code}</span>
                                    <span>${position.name}</span>
                                </div>
                                <div class="stock-price ${changeColor}">
                                    <i class="fas ${changeIcon}"></i> ¥${position.current_price.toFixed(2)}
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                                <span>持仓: ${position.amount}股</span>
                                <span>成本: ¥${position.cost_price.toFixed(2)}</span>
                                <span>盈亏: <span class="${position.profit_loss >= 0 ? 'price-up' : 'price-down'}">
                                    ${position.profit_loss >= 0 ? '+' : ''}${position.profit_loss.toFixed(2)} (${position.profit_loss_pct >= 0 ? '+' : ''}${position.profit_loss_pct.toFixed(2)}%)
                                </span></span>
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                
                // 添加总览
                html += `
                    <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                        <h3>持仓总览</h3>
                        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                            <div>
                                <div style="font-size: 0.9rem; color: #666;">持仓总价值</div>
                                <div style="font-size: 1.2rem; font-weight: bold;">¥${data.overview.total_value.toFixed(2)}</div>
                            </div>
                            <div>
                                <div style="font-size: 0.9rem; color: #666;">总盈亏</div>
                                <div style="font-size: 1.2rem; font-weight: bold;" class="${data.overview.total_profit >= 0 ? 'price-up' : 'price-down'}">
                                    ${data.overview.total_profit >= 0 ? '+' : ''}${data.overview.total_profit.toFixed(2)} (${data.overview.total_profit_pct >= 0 ? '+' : ''}${data.overview.total_profit_pct.toFixed(2)}%)
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; font-size: 0.9rem; color: #666;">
                            数据源: ${data.overview.data_source}
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i> 加载持仓数据失败
                        <p style="margin-top: 10px; font-size: 0.9rem;">${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">请确保后端服务正在运行 (${API_BASE_URL})</p>
                    </div>
                `;
            }
        }
        
        // 加载市场概况
        async function loadMarketOverview() {
            const container = document.getElementById('marketOverview');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>加载市场数据...</div>';
            
            try {
                const response = await fetchApi('/api/market_overview');
                if (!response.ok) throw new Error('网络请求失败');
                
                const data = await response.json();
                
                let html = '<div style="display: grid; gap: 15px;">';
                
                // 主要指数
                if (data.indices && data.indices.length > 0) {
                    html += '<h3>主要指数</h3>';
                    data.indices.forEach(index => {
                        const isUp = index.change >= 0;
                        const changeColor = isUp ? 'price-up' : 'price-down';
                        const changeIcon = isUp ? 'fa-arrow-up' : 'fa-arrow-down';
                        
                        html += `
                            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                                <div>
                                    <div style="font-weight: bold;">${index.name}</div>
                                    <div style="font-size: 0.9rem; color: #666;">${index.code}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1.2rem; font-weight: bold;">${index.price?.toFixed(2) || '--'}</div>
                                    <div class="${changeColor}">
                                        <i class="fas ${changeIcon}"></i> ${index.change?.toFixed(2) || '0.00'}%
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                // 市场情绪
                if (data.market_sentiment) {
                    html += '<h3 style="margin-top: 20px;">市场情绪</h3>';
                    const sentiment = data.market_sentiment;
                    
                    html += `
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                            <div style="text-align: center; padding: 10px; background: #e8f4fc; border-radius: 5px;">
                                <div style="font-size: 0.9rem; color: #666;">上涨</div>
                                <div style="font-size: 1.2rem; font-weight: bold; color: #e74c3c;">${sentiment.rise_count || 0}</div>
                            </div>
                            <div style="text-align: center; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                                <div style="font-size: 0.9rem; color: #666;">平盘</div>
                                <div style="font-size: 1.2rem; font-weight: bold;">${sentiment.flat_count || 0}</div>
                            </div>
                            <div style="text-align: center; padding: 10px; background: #f0f8f0; border-radius: 5px;">
                                <div style="font-size: 0.9rem; color: #666;">下跌</div>
                                <div style="font-size: 1.2rem; font-weight: bold; color: #27ae60;">${sentiment.fall_count || 0}</div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; font-size: 0.9rem; color: #666;">
                            上涨比例: ${sentiment.rise_ratio || '0'}% | 热门股票: ${sentiment.hot_stocks || 0}只
                        </div>
                    `;
                }
                
                html += `
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; font-size: 0.9rem; color: #666;">
                        更新时间: ${data.update_time || '--'}<br>
                        数据源: ${data.data_source || '未知'}
                    </div>
                `;
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i> 加载市场数据失败
                        <p style="margin-top: 10px; font-size: 0.9rem;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 分析所有股票
        async function analyzeAllStocks() {
            const container = document.getElementById('algorithmAnalysis');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>执行五维度算法分析...</div>';
            
            try {
                const response = await fetchApi('/api/analyze_all');
                if (!response.ok) throw new Error('分析请求失败');
                
                const data = await response.json();
                
                let html = '<div style="margin-bottom: 20px;">';
                
                // 整体评分
                html += `
                    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                        <h3 style="margin-bottom: 10px;">整体分析结果</h3>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-size: 2.5rem; font-weight: bold;">${data.overall_analysis.overall_score.toFixed(1)}</div>
                                <div>综合评分</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 1.2rem; font-weight: bold;">${data.overall_analysis.overall_risk.level || '未知'}</div>
                                <div>风险等级</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // 各股票分析结果
                data.stocks.forEach(stock => {
                    const scores = stock.algorithm_scores;
                    const comprehensiveScore = stock.comprehensive_score;
                    const riskLevel = stock.risk_level;
                    
                    // 计算算法评分颜色
                    const getScoreColor = (score) => {
                        if (score >= 4) return '#27ae60'; // 绿色
                        if (score >= 3) return '#2ecc71'; // 浅绿
                        if (score >= 2) return '#f1c40f'; // 黄色
                        if (score >= 1) return '#e67e22'; // 橙色
                        return '#e74c3c'; // 红色
                    };
                    
                    html += `
                        <div style="background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                                <div>
                                    <h4 style="margin: 0;">${stock.stock_name || stock.stock_code}</h4>
                                    <div style="font-size: 0.9rem; color: #666;">当前价格: ¥${stock.current_price?.toFixed(2) || '--'}</div>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 1.5rem; font-weight: bold; color: ${comprehensiveScore >= 3 ? '#27ae60' : '#e74c3c'}">
                                        ${comprehensiveScore.toFixed(1)}
                                    </div>
                                    <div style="font-size: 0.9rem; color: #666;">综合评分</div>
                                </div>
                            </div>
                            
                            <div class="algorithm-grid">
                                <div class="algorithm-item" style="background: ${getScoreColor(scores.international)}">
                                    <div class="score-name">国际局势</div>
                                    <div class="score-display">${scores.international.toFixed(1)}</div>
                                </div>
                                <div class="algorithm-item" style="background: ${getScoreColor(scores.policy)}">
                                    <div class="score-name">国内政策</div>
                                    <div class="score-display">${scores.policy.toFixed(1)}</div>
                                </div>
                                <div class="algorithm-item" style="background: ${getScoreColor(scores.company)}">
                                    <div class="score-name">企业发展</div>
                                    <div class="score-display">${scores.company.toFixed(1)}</div>
                                </div>
                                <div class="algorithm-item" style="background: ${getScoreColor(scores.technical)}">
                                    <div class="score-name">技术分析</div>
                                    <div class="score-display">${scores.technical.toFixed(1)}</div>
                                </div>
                                <div class="algorithm-item" style="background: ${getScoreColor(scores.sentiment)}">
                                    <div class="score-name">市场情绪</div>
                                    <div class="score-display">${scores.sentiment.toFixed(1)}</div>
                                </div>
                            </div>
                            
                            <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">
                                风险等级: ${riskLevel.level || '未知'} | 数据源: ${stock.data_source || '模拟数据'}
                            </div>
                        </div>
                    `;
                });
                
                html += '</div>';
                container.innerHTML = html;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i> 分析失败
                        <p style="margin-top: 10px; font-size: 0.9rem;">${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">请确保后端服务正常运行</p>
                    </div>
                `;
            }
        }
        
        // 分析单个股票
        async function analyzeStock(stockCode) {
            const container = document.getElementById('algorithmAnalysis');
            container.innerHTML = `<div class="loading"><i class="fas fa-spinner fa-spin"></i><br>分析 ${stockCode} ...</div>`;
            
            try {
                const response = await fetchApi(`/api/analyze/${stockCode}`);
                if (!response.ok) throw new Error('分析请求失败');
                
                const data = await response.json();
                
                // 显示分析结果
                container.innerHTML = `
                    <div style="background: white; border: 1px solid #eee; border-radius: 8px; padding: 20px;">
                        <h3>${data.stock_name || data.stock_code} - 详细分析</h3>
                        <div style="display: flex; justify-content: space-between; margin: 20px 0;">
                            <div>
                                <div style="font-size: 0.9rem; color: #666;">当前价格</div>
                                <div style="font-size: 1.5rem; font-weight: bold;">¥${data.current_price?.toFixed(2) || '--'}</div>
                            </div>
                            <div>
                                <div style="font-size: 0.9rem; color: #666;">综合评分</div>
                                <div style="font-size: 1.5rem; font-weight: bold; color: ${data.comprehensive_score >= 3 ? '#27ae60' : '#e74c3c'}">${data.comprehensive_score?.toFixed(1) || '--'}</div>
                            </div>
                            <div>
                                <div style="font-size: 0.9rem; color: #666;">风险等级</div>
                                <div style="font-size: 1.2rem; font-weight: bold;">${data.risk_level?.level || '未知'}</div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 20px; font-size: 0.9rem; color: #666;">
                            数据源: ${data.data_source || '未知'} | 分析时间: ${data.analysis_time || '--'}
                        </div>
                    </div>
                `;
                
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i> 分析失败
                        <p style="margin-top: 10px; font-size: 0.9rem;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 检查系统状态
        async function checkSystemStatus() {
            const statusElement = document.getElementById('systemStatus');
            const dataStatusElement = document.getElementById('dataStatus');
            
            try {
                const response = await fetchApi('/api/data_status');
                if (!response.ok) throw new Error('无法连接到后端服务');
                
                const data = await response.json();
                
                // 更新数据状态
                if (data.tushare_token_configured && data.use_real_data) {
                    dataStatusElement.className = 'data-status status-real';
                    dataStatusElement.innerHTML = '<i class="fas fa-database"></i> 数据模式：真实数据';
                } else {
                    dataStatusElement.className = 'data-status status-mock';
                    dataStatusElement.innerHTML = '<i class="fas fa-database"></i> 数据模式：模拟数据';
                }
                
                // 显示系统状态
                statusElement.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;">
                        <div style="padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            <div style="font-size: 0.9rem; color: #666;">数据源状态</div>
                            <div style="font-size: 1.1rem; font-weight: bold;">${data.tushare_token_configured ? '已配置' : '未配置'}</div>
                        </div>
                        <div style="padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            <div style="font-size: 0.9rem; color: #666;">数据模式</div>
                            <div style="font-size: 1.1rem; font-weight: bold;">${data.use_real_data ? '真实数据' : '模拟数据'}</div>
                        </div>
                        <div style="padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            <div style="font-size: 0.9rem; color: #666;">缓存数量</div>
                            <div style="font-size: 1.1rem; font-weight: bold;">${data.cache_size} 个</div>
                        </div>
                        <div style="padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            <div style="font-size: 0.9rem; color: #666;">持仓股票</div>
                            <div style="font-size: 1.1rem; font-weight: bold;">${data.positions_count} 只</div>
                        </div>
                    </div>
                    <div style="margin-top: 15px; font-size: 0.9rem; color: #666;">
                        服务器时间: ${data.server_time}
                    </div>
                `;
                
            } catch (error) {
                dataStatusElement.className = 'data-status status-mock';
                dataStatusElement.innerHTML = '<i class="fas fa-database"></i> 数据模式：后端服务不可用';
                
                statusElement.innerHTML = `
                    <div class="error">
                        <i class="fas fa-exclamation-triangle"></i> 后端服务连接失败
                        <p style="margin-top: 10px; font-size: 0.9rem;">${error.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">${getApiHelpText()}</p>
                        <button class="refresh-btn" onclick="checkSystemStatus()" style="margin-top: 10px;">
                            <i class="fas fa-sync-alt"></i> 重试连接
                        </button>
                    </div>
                `;
            }
        }
        
        // 页面加载时初始化
        window.onload = function() {
            checkSystemStatus();
            loadPositions();
            loadMarketOverview();
            
            // 每30秒检查一次状态
            setInterval(checkSystemStatus, 30000);
        };
    </script>
</body>
</html>
