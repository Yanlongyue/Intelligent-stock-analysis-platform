<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能股票分析平台</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --red: #f85149;
      --green: #3fb950;
      --yellow: #d29922;
      --purple: #bc8cff;
      --orange: #e3b341;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ========== 顶部 Header ========== */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text-dim); font-weight: 400; font-size: 14px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .btn {
      padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px;
      transition: all .15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #79b8ff; border-color: #79b8ff; }

    /* ========== Token 状态条 ========== */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .status-dot.offline { background: var(--red); }
    .status-dot.mock { background: var(--yellow); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    .status-text { color: var(--text-dim); }
    .status-badge {
      padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-real { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .badge-mock { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
    .badge-offline { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .status-time { margin-left: auto; color: var(--text-dim); }

    /* ========== 主布局 ========== */
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    /* ========== 统计卡片区 ========== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    @media(max-width:900px){ .stats-grid { grid-template-columns: repeat(2,1fr); } }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px;
    }
    .stat-label { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
    .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
    .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .up { color: var(--red); }
    .down { color: var(--green); }
    .neutral { color: var(--text-dim); }

    /* ========== 两栏布局 ========== */
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; margin-bottom: 20px; }
    @media(max-width:1100px){ .main-grid { grid-template-columns: 1fr; } }

    /* ========== 面板通用 ========== */
    .panel {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-size: 15px; font-weight: 600; }
    .panel-body { padding: 16px 20px; }

    /* ========== 持仓表格 ========== */
    .positions-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .positions-table th {
      text-align: left; color: var(--text-dim);
      padding: 6px 10px; font-weight: 500; border-bottom: 1px solid var(--border);
    }
    .positions-table td { padding: 10px 10px; border-bottom: 1px solid rgba(48,54,61,.5); }
    .positions-table tr:last-child td { border-bottom: none; }
    .positions-table tr:hover td { background: rgba(88,166,255,.04); cursor: pointer; }
    .stock-name { font-weight: 600; font-size: 14px; }
    .stock-code { color: var(--text-dim); font-size: 11px; }
    .type-badge {
      display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 500;
    }
    .type-value { background: rgba(88,166,255,.15); color: var(--accent); }
    .type-growth { background: rgba(63,185,80,.15); color: var(--green); }
    .type-concept { background: rgba(188,140,255,.15); color: var(--purple); }
    .profit-cell { font-weight: 600; font-size: 14px; }

    /* ========== 市场概况 ========== */
    .market-panel { }
    .index-list { list-style: none; }
    .index-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid rgba(48,54,61,.5);
    }
    .index-item:last-child { border-bottom: none; }
    .index-name { font-size: 13px; font-weight: 500; }
    .index-price { font-size: 15px; font-weight: 700; }
    .index-change { font-size: 12px; font-weight: 500; }
    .market-mood {
      margin-top: 14px; display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
    }
    .mood-item {
      background: var(--bg3); border-radius: 8px; padding: 10px 12px; text-align: center;
    }
    .mood-value { font-size: 18px; font-weight: 700; }
    .mood-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ========== 分析输出区域 ========== */
    .analysis-section { margin-bottom: 20px; }
    .analysis-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    @media(max-width:960px){ .analysis-grid { grid-template-columns: 1fr; } }

    .analysis-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: border-color .2s, transform .2s;
    }
    .analysis-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .analysis-card-header {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .analysis-stock-name { font-size: 15px; font-weight: 700; }
    .analysis-stock-code { font-size: 12px; color: var(--text-dim); }
    .analysis-score {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; flex-shrink: 0;
    }
    .score-high { background: rgba(248,81,73,.15); color: var(--red); border: 2px solid rgba(248,81,73,.4); }
    .score-mid { background: rgba(210,153,34,.15); color: var(--yellow); border: 2px solid rgba(210,153,34,.4); }
    .score-low { background: rgba(63,185,80,.15); color: var(--green); border: 2px solid rgba(63,185,80,.4); }

    .analysis-card-body { padding: 14px 18px; }
    .five-dim { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .dim-item {
      display: flex; align-items: center; gap: 6px; font-size: 12px;
    }
    .dim-label { color: var(--text-dim); flex: 0 0 auto; }
    .dim-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .dim-bar { height: 100%; border-radius: 2px; transition: width .6s ease; }
    .dim-val { flex: 0 0 22px; text-align: right; font-weight: 600; font-size: 11px; }

    .analysis-signal {
      margin-top: 10px; padding: 8px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 600; text-align: center;
    }
    .signal-buy { background: rgba(248,81,73,.1); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .signal-hold { background: rgba(210,153,34,.1); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
    .signal-sell { background: rgba(63,185,80,.1); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
    .signal-watch { background: rgba(88,166,255,.1); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }

    .analysis-card-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .detail-btn {
      font-size: 12px; color: var(--accent); background: none; border: none;
      cursor: pointer; display: flex; align-items: center; gap: 4px;
    }
    .detail-btn:hover { text-decoration: underline; }
    .risk-label { font-size: 12px; }
    .risk-low { color: var(--green); }
    .risk-mid { color: var(--yellow); }
    .risk-high { color: var(--red); }

    /* ========== 价格历史图表 ========== */
    .chart-wrap {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 20px;
    }
    .chart-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .chart-tab {
      padding: 4px 12px; border-radius: 20px; font-size: 12px;
      background: var(--bg3); border: 1px solid var(--border); cursor: pointer; color: var(--text-dim);
    }
    .chart-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #price-chart { width: 100%; height: 220px; }

    /* ========== 空状态 / 加载 ========== */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 20px; gap: 14px; color: var(--text-dim);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }

    /* ========== 五维详情弹窗 ========== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: none; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
      width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px; }

    /* 五维雷达图区域 */
    .dim-detail-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 20px; }
    @media(max-width:600px){ .dim-detail-grid { grid-template-columns: repeat(2,1fr); } }
    .dim-detail-card {
      background: var(--bg3); border-radius: 10px; padding: 14px;
      border: 1px solid var(--border); text-align: center;
    }
    .dim-detail-icon { font-size: 24px; margin-bottom: 6px; }
    .dim-detail-name { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
    .dim-detail-score { font-size: 28px; font-weight: 800; line-height: 1; }
    .dim-detail-desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .dim-detail-bar-wrap { width: 100%; height: 6px; background: var(--bg2); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .dim-detail-bar { height: 100%; border-radius: 3px; transition: width .8s ease; }

    /* 分析详情文本 */
    .analysis-detail-section { margin-bottom: 20px; }
    .analysis-detail-title {
      font-size: 13px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .signal-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: var(--bg3); border-radius: 8px; margin-bottom: 6px;
    }
    .signal-icon { font-size: 16px; }
    .signal-text { font-size: 13px; }

    /* 价格信息表 */
    .price-info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .price-info-item { background: var(--bg3); border-radius: 8px; padding: 10px 14px; }
    .price-info-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .price-info-value { font-size: 16px; font-weight: 700; }

    /* 操作建议区 */
    .action-plan {
      background: var(--bg3); border-radius: 10px; padding: 16px;
      border-left: 3px solid var(--accent);
    }
    .action-plan-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .action-plan-item {
      display: flex; gap: 10px; font-size: 13px; padding: 4px 0;
      color: var(--text);
    }
    .action-plan-item .key { color: var(--text-dim); flex: 0 0 60px; }

    /* SVG 雷达图 */
    #radar-svg-wrap { display: flex; justify-content: center; margin-bottom: 20px; }

    /* ========== 底部说明 ========== */
    .disclaimer {
      font-size: 11px; color: var(--text-dim); text-align: center;
      padding: 20px; border-top: 1px solid var(--border); margin-top: 20px;
      line-height: 1.6;
    }

    /* 分析进度 */
    .analysis-progress {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 20px; display: none;
    }
    .progress-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
    .progress-steps { display: flex; flex-direction: column; gap: 10px; }
    .progress-step { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .step-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .step-pending { background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim); }
    .step-running { background: rgba(88,166,255,.2); border: 1px solid var(--accent); color: var(--accent); animation: pulse 1s infinite; }
    .step-done { background: rgba(63,185,80,.2); border: 1px solid var(--green); color: var(--green); }
  </style>
</head>
<body>

<!-- 顶部导航 -->
<header class="header">
  <div class="header-left">
    <div class="logo">📈 智能股票分析<span> · 持仓看板</span></div>
  </div>
  <div class="header-right">
    <button class="btn" onclick="refreshAll()">🔄 刷新数据</button>
    <button class="btn btn-primary" onclick="analyzeAll()">🧠 立即分析</button>
  </div>
</header>

<!-- Token & API 状态条 -->
<div class="status-bar" id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span class="status-text" id="status-text">检测中...</span>
  <span class="status-badge" id="status-badge" style="display:none"></span>
  <span class="status-time" id="status-time"></span>
</div>

<!-- 分析进度区 -->
<div class="analysis-progress" id="analysis-progress">
  <div class="progress-title">🧠 正在执行五维算法分析…</div>
  <div class="progress-steps" id="progress-steps"></div>
</div>

<!-- 主内容 -->
<div class="container">

  <!-- 总览数字 -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card">
      <div class="stat-label">总持仓市值</div>
      <div class="stat-value" id="total-value">--</div>
      <div class="stat-sub" id="total-cost">成本: --</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">总盈亏</div>
      <div class="stat-value" id="total-profit">--</div>
      <div class="stat-sub" id="total-profit-pct">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">持仓只数</div>
      <div class="stat-value" id="position-count">--</div>
      <div class="stat-sub">当前持仓股</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">综合风险评级</div>
      <div class="stat-value" id="risk-level">--</div>
      <div class="stat-sub" id="risk-hint">--</div>
    </div>
  </div>

  <!-- 主二栏 -->
  <div class="main-grid">
    <!-- 左侧：持仓表格 -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 当前持仓</span>
        <span id="position-update-time" style="font-size:12px;color:var(--text-dim)"></span>
      </div>
      <div class="panel-body" style="padding:0">
        <div id="positions-wrap">
          <div class="loading-wrap"><div class="spinner"></div><span>加载持仓数据…</span></div>
        </div>
      </div>
    </div>

    <!-- 右侧：市场概况 -->
    <div class="panel market-panel">
      <div class="panel-header">
        <span class="panel-title">🌐 市场概况</span>
        <span id="market-source" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <div class="panel-body" id="market-body">
        <div class="loading-wrap" style="padding:40px 20px"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 五维分析卡片区 -->
  <div class="analysis-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 style="font-size:16px;font-weight:700">🔬 五维算法分析</h2>
      <span style="font-size:12px;color:var(--text-dim)">点击卡片或"详情"查看完整报告</span>
    </div>
    <div class="analysis-grid" id="analysis-grid">
      <div class="loading-wrap" style="grid-column:1/-1;padding:60px 20px">
        <div class="spinner"></div>
        <span>尚未执行分析，点击右上角「立即分析」开始</span>
      </div>
    </div>
  </div>

  <!-- 价格走势图 -->
  <div class="chart-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="font-size:15px;font-weight:700">📉 价格走势</h3>
      <div class="chart-tabs" id="chart-tabs"></div>
    </div>
    <canvas id="price-chart"></canvas>
    <div class="empty-state" id="chart-empty">请先选择一只股票查看历史走势</div>
  </div>

  <div class="disclaimer">
    ⚠️ 本平台仅供参考，不构成投资建议。股市有风险，投资需谨慎。<br>
    数据来源：Tushare Pro（真实数据模式）/ 内置模拟引擎（演示模式）
  </div>
</div>

<!-- ===== 五维详情弹窗 ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-stock-name">--</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:2px" id="modal-stock-code">--</div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
/* ======================================================
   配置区
   ====================================================== */
const CONFIG = {
  api: (function(){
    // 优先从 config.js 读取，回退到本地/环境
    if(typeof STOCK_API_BASE !== 'undefined') return STOCK_API_BASE;
    // 如果是在本地直接运行，尝试 localhost:9000
    if(location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      return 'http://localhost:9000';
    // GitHub Pages 等静态环境：纯前端演示模式
    return null;
  })(),
  refreshInterval: 30000,  // 30s 自动刷新
  chartDays: 30
};

/* ======================================================
   状态
   ====================================================== */
let state = {
  apiOnline: false,
  dataSource: 'unknown',
  positions: [],
  overview: null,
  analysis: {},
  market: null,
  selectedStock: null,
  priceHistory: {}
};

/* ======================================================
   工具函数
   ====================================================== */
const fmt = {
  money: v => v == null ? '--' : '¥' + Number(v).toLocaleString('zh-CN', {minimumFractionDigits:2,maximumFractionDigits:2}),
  pct:   v => v == null ? '--' : (v>=0?'+':'')+Number(v).toFixed(2)+'%',
  num:   v => v == null ? '--' : Number(v).toLocaleString('zh-CN'),
  score: v => v == null ? '-' : Number(v).toFixed(1),
  now:   () => new Date().toLocaleString('zh-CN',{hour12:false})
};

function colorClass(v) {
  if(v > 0) return 'up';
  if(v < 0) return 'down';
  return 'neutral';
}

async function apiFetch(path, fallbackFn) {
  if(!CONFIG.api) return fallbackFn ? fallbackFn() : null;
  try {
    const r = await fetch(CONFIG.api + path, {signal: AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    console.warn('API error:', path, e.message);
    return fallbackFn ? fallbackFn() : null;
  }
}

/* ======================================================

async function checkApiStatus() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const badge = document.getElementById('status-badge');
  const timeEl = document.getElementById('status-time');

  if(!CONFIG.api) {
    dot.className = 'status-dot mock';
    txt.textContent = '静态演示模式（未连接后端）';
    badge.textContent = '模拟数据';
    badge.className = 'status-badge badge-mock';
    badge.style.display = '';
    state.apiOnline = false;
    state.dataSource = 'mock';
    timeEl.textContent = fmt.now();
    return;
  }

  try {
    const health = await apiFetch('/api/health');
    if(health && health.status === 'healthy') {
      state.apiOnline = true;
      const isReal = health.data_provider === 'Tushare Pro';
      state.dataSource = isReal ? 'real' : 'mock';
      dot.className = 'status-dot online';
      txt.textContent = '后端已连接 · ' + (isReal ? 'Tushare Pro 真实数据' : '模拟数据模式');
      badge.textContent = isReal ? '真实数据' : '模拟数据';
      badge.className = 'status-badge ' + (isReal ? 'badge-real' : 'badge-mock');
      badge.style.display = '';
    } else {
      throw new Error('unhealthy');
    }
  } catch(e) {
    dot.className = 'status-dot offline';
    txt.textContent = '后端离线 · 使用内置演示数据';
    badge.textContent = '离线';
    badge.className = 'status-badge badge-offline';
    badge.style.display = '';
    state.apiOnline = false;
    state.dataSource = 'mock';
  }
  timeEl.textContent = '更新于 ' + fmt.now();
}

function getMockPriceHistory(code) {
  const base = MOCK_POSITIONS.find(p=>p.code===code)?.current_price || 3.0;
  const history = [];
  let p = base * (1 + (Math.random()-0.5)*0.3);
  for(let i=29; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const dateStr = d.toISOString().slice(0,10).replace(/-/g,'');
    p *= (1 + (Math.random()-0.5)*0.04);
    history.push({date:dateStr,open:+(p*(1+(Math.random()-.5)*.01)).toFixed(2),close:+p.toFixed(2),
      high:+(p*1.01).toFixed(2),low:+(p*0.99).toFixed(2),volume:Math.round(Math.random()*5e7)});
  }
  return { stock_code:code, price_history:history };
}

async function analyzeAll() {
  const grid = document.getElementById('analysis-grid');
  const progress = document.getElementById('analysis-progress');
  const steps = ['国际局势', '国内政策', '企业动态', '技术面', '股民情绪'];

  // 显示进度
  progress.style.display = '';
  document.getElementById('progress-steps').innerHTML = steps.map((s,i)=>`
    <div class="progress-step" id="step-${i}">
      <div class="step-icon step-pending" id="step-icon-${i}">○</div>
      <span>${s}分析中…</span>
    </div>`).join('');

  grid.innerHTML = '<div class="loading-wrap" style="grid-column:1/-1;padding:60px 20px"><div class="spinner"></div><span>五维算法分析中，请稍候…</span></div>';

  // 按顺序展示各步骤动画
  for(let i=0; i<steps.length; i++) {
    document.getElementById('step-icon-'+i).className = 'step-icon step-running';
    document.getElementById('step-icon-'+i).textContent = '…';
    await new Promise(r=>setTimeout(r, 400));
    document.getElementById('step-icon-'+i).className = 'step-icon step-done';
    document.getElementById('step-icon-'+i).textContent = '✓';
  }

  // 获取分析数据
  const data = await apiFetch('/api/analyze_all', () => ({
    stocks: MOCK_POSITIONS.map(p => ({...getMockAnalysis(p.code), position_info:{type:p.type,amount:p.amount,cost_price:p.cost_price}})),
    overall_analysis: { overall_score:2.8, overall_risk:'中风险', data_source:'演示数据' }
  }));

  progress.style.display = 'none';

  if(!data || !data.stocks) {
    grid.innerHTML = '<div class="empty-state">分析失败，请检查后端连接</div>';
    return;
  }

  data.stocks.forEach(s => { state.analysis[s.stock_code] = s; });

  renderAnalysisCards(data.stocks);
  renderChartTabs();

  // 更新综合风险
  const oa = data.overall_analysis || {};
  if(oa.overall_risk) {
    const riskEl = document.getElementById('risk-level');
    riskEl.textContent = oa.overall_risk;
    riskEl.className = 'stat-value ' + (oa.overall_risk.includes('高')?'up':oa.overall_risk.includes('低')?'down':'neutral');
  }
}

const DIM_NAMES = { international:'国际局势', policy:'国内政策', company:'企业动态', technical:'技术面', sentiment:'股民情绪' };
const DIM_ICONS = { international:'🌐', policy:'📋', company:'🏢', technical:'📊', sentiment:'💬' };

function scoreColor(v) {
  if(v>=3.5) return '#f85149';
  if(v>=2.5) return '#d29922';
  return '#3fb950';
}
function scoreClass(v) {
  if(v>=3.5) return 'score-high';
  if(v>=2.5) return 'score-mid';
  return 'score-low';
}
function signalClass(sig) {
  if(!sig) return 'signal-hold';
  const s = sig.toLowerCase();
  if(s.includes('买')||s.includes('buy')||s.includes('看多')) return 'signal-buy';
  if(s.includes('卖')||s.includes('sell')||s.includes('减仓')) return 'signal-sell';
  return 'signal-hold';
}

function renderAnalysisCards(stocks) {
  const grid = document.getElementById('analysis-grid');
  grid.innerHTML = stocks.map(s => {
    const sc = s.algorithm_scores || {};
    const total = s.comprehensive_score || 2.5;
    const dims = Object.entries(DIM_NAMES).map(([k,name])=>{
      const v = sc[k]||0; const pct = Math.min(100,(v/5)*100);
      return `<div class="dim-item">
        <span class="dim-label">${name}</span>
        <div class="dim-bar-wrap"><div class="dim-bar" style="width:${pct}%;background:${scoreColor(v)}"></div></div>
        <span class="dim-val" style="color:${scoreColor(v)}">${fmt.score(v)}</span>
      </div>`;
    }).join('');

    const sig = s.trading_signal || '中性观望';
    return `
    <div class="analysis-card" onclick="showDetail('${s.stock_code}')">
      <div class="analysis-card-header">
        <div>
          <div class="analysis-stock-name">${s.stock_name||s.stock_code}</div>
          <div class="analysis-stock-code">${s.stock_code}</div>
        </div>
        <div class="analysis-score ${scoreClass(total)}">${fmt.score(total)}</div>
      </div>
      <div class="analysis-card-body">
        <div class="five-dim">${dims}</div>
        <div class="analysis-signal ${signalClass(sig)}">${sig}</div>
      </div>
      <div class="analysis-card-footer">
        <span class="risk-label ${s.risk_level?.includes('高')?'risk-high':s.risk_level?.includes('低')?'risk-low':'risk-mid'}">
          ${s.risk_level||'--'}
        </span>
        <button class="detail-btn" onclick="event.stopPropagation();showDetail('${s.stock_code}')">
          查看详情 →
        </button>
      </div>
    </div>`;
  }).join('');
}

function scoreMeaning(dim, v) {
  const m = {
    international: ['外部压制','外部中性','外部利好'],
    policy:        ['政策逆风','政策中性','政策顺风'],
    company:       ['基本面弱','基本面中','基本面强'],
    technical:     ['技术弱势','技术中性','技术强势'],
    sentiment:     ['情绪低迷','情绪中性','情绪亢奋']
  };
  const arr = m[dim] || ['弱','中','强'];
  return v>=3.5 ? arr[2] : v>=2.5 ? arr[1] : arr[0];
}

function buildRadarSvg(scores) {
  const dims = Object.keys(DIM_NAMES);
  const N = dims.length;
  const cx=110, cy=110, R=80;
  const pts = dims.map((d,i) => {
    const angle = (Math.PI*2/N)*i - Math.PI/2;
    const v = Math.min(5, scores[d]||0);
    const r = (v/5)*R;
    return {x: cx+r*Math.cos(angle), y: cy+r*Math.sin(angle),
            lx: cx+(R+18)*Math.cos(angle), ly: cy+(R+18)*Math.sin(angle)};
  });
  const polyPts = pts.map(p=>`${p.x},${p.y}`).join(' ');
  // 背景网
  let bg='';
  for(let l=1;l<=5;l++){
    const ps=dims.map((_,i)=>{const a=(Math.PI*2/N)*i-Math.PI/2;const r=(l/5)*R;return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
    bg+=`<polygon points="${ps}" fill="none" stroke="var(--border)" stroke-width="1"/>`;
  }
  // 轴线
  let axes=''; dims.forEach((_,i)=>{const a=(Math.PI*2/N)*i-Math.PI/2;axes+=`<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="var(--border)" stroke-width="1"/>`;});
  // 标签
  const labels = dims.map((d,i)=>`<text x="${pts[i].lx}" y="${pts[i].ly}" text-anchor="middle" dominant-baseline="central" fill="var(--text-dim)" font-size="10">${DIM_NAMES[d]}</text>`).join('');
  return `<svg width="220" height="220" viewBox="0 0 220 220">
    ${bg}${axes}
    <polygon points="${polyPts}" fill="rgba(88,166,255,.2)" stroke="var(--accent)" stroke-width="2"/>
    ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)"/>`).join('')}
    ${labels}
  </svg>`;
}

/* ======================================================
   价格走势图（Canvas）
   ====================================================== */
function renderChartTabs() {
  const tabs = document.getElementById('chart-tabs');
  tabs.innerHTML = state.positions.map(p=>`
    <button class="chart-tab" data-code="${p.code}" data-name="${p.name}" onclick="loadPriceHistory('${p.code}','${p.name}')">
      ${p.name}
    </button>`).join('');
}

async function loadPriceHistory(code, name) {
  document.getElementById('chart-empty').style.display='none';
  // 切换 tab 高亮
  document.querySelectorAll('.chart-tab').forEach(b=>b.classList.toggle('active', b.dataset.code===code));
  state.selectedStock = code;

  let data = state.priceHistory[code];
  if(!data) {
    data = await apiFetch('/api/price_history/'+code, ()=>getMockPriceHistory(code));
    if(data) state.priceHistory[code] = data;
  }
  if(!data || !data.price_history) return;
  drawPriceChart(data.price_history, name||code);
}

function drawPriceChart(history, title) {
  const canvas = document.getElementById('price-chart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  const W = canvas.parentElement.clientWidth - 40;
  const H = 220;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.scale(dpr,dpr);

  const closes = history.map(h=>h.close);
  const min = Math.min(...closes)*0.998;
  const max = Math.max(...closes)*1.002;
  const toX = i => 40 + (i/(history.length-1))*(W-60);
  const toY = v => H-30 - ((v-min)/(max-min))*(H-50);

  // 背景
  ctx.fillStyle='#161b22'; ctx.fillRect(0,0,W,H);

  // 网格
  ctx.strokeStyle='rgba(48,54,61,.8)'; ctx.lineWidth=0.5;
  for(let i=0;i<4;i++){
    const y=toY(min+(max-min)/3*i);
    ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(W-20,y); ctx.stroke();
    ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    ctx.fillText((min+(max-min)/3*i).toFixed(2), 36, y+4);
  }

  // 日期轴
  const step=Math.ceil(history.length/6);
  ctx.fillStyle='#8b949e'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  for(let i=0;i<history.length;i+=step){
    const d=history[i].date; const label=d.slice(4,6)+'/'+d.slice(6,8);
    ctx.fillText(label, toX(i), H-10);
  }

  // 渐变填充
  const grad = ctx.createLinearGradient(0,0,0,H);
  const isUp = closes[closes.length-1] >= closes[0];
  const mainColor = isUp ? '#f85149' : '#3fb950';
  grad.addColorStop(0, isUp?'rgba(248,81,73,.3)':'rgba(63,185,80,.3)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.moveTo(toX(0),toY(closes[0]));
  closes.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
  ctx.lineTo(toX(closes.length-1),H-30); ctx.lineTo(toX(0),H-30); ctx.closePath(); ctx.fill();

  // 折线
  ctx.strokeStyle=mainColor; ctx.lineWidth=2; ctx.lineJoin='round';
  ctx.beginPath(); closes.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.stroke();

  // 标题
  ctx.fillStyle='#c9d1d9'; ctx.font='bold 13px sans-serif'; ctx.textAlign='left';
  ctx.fillText(title+' · '+history.length+'日收盘', 40, 16);
  const last=closes[closes.length-1]; const first=closes[0];
  const chg=((last-first)/first*100).toFixed(2);
  ctx.fillStyle = chg>=0?mainColor:'#8b949e';
  ctx.font='12px sans-serif'; ctx.textAlign='right';
  ctx.fillText((chg>=0?'+':'')+chg+'%', W-20, 16);
}

/* ======================================================
   初始化和刷新
   ====================================================== */
async function refreshAll() {
  await checkApiStatus();
  await Promise.all([loadPositions(), loadMarket()]);
  renderChartTabs();
}

async function init() {
  await checkApiStatus();
  await Promise.all([loadPositions(), loadMarket()]);
  renderChartTabs();
  // 自动刷新
  setInterval(async()=>{
    await checkApiStatus();
    await Promise.all([loadPositions(), loadMarket()]);
  }, CONFIG.refreshInterval);
}

// 键盘 Esc 关闭弹窗
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModalDirect(); });

// 启动
init();
</script>
