<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>智能股票分析平台</title>
    <meta http-equiv="refresh" content="0; url=web_interface_enhanced.html">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .loading {
            font-size: 1.2em;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #ffdd40;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            background: rgba(255, 221, 64, 0.2);
            border-radius: 10px;
            margin-top: 20px;
            display: inline-block;
        }
        a:hover {
            background: rgba(255, 221, 64, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 智能股票分析平台</h1>
        <p class="loading">正在加载最新版五维度算法分析界面...</p>
        <div class="spinner"></div>
        <p>如果页面没有自动跳转，请点击下方链接：</p>
        <a href="web_interface_enhanced.html">立即访问股票分析平台</a>
    </div>
</body>
</html>
